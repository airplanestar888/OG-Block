<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Base Culture Score Options</title>
    <style>
      body {
        color: #101418;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        width: 360px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input {
        border: 1px solid rgba(0, 0, 0, 0.18);
        border-radius: 6px;
        box-sizing: border-box;
        font: inherit;
        padding: 10px;
        width: 100%;
      }

      button {
        background: #0052ff;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        margin-top: 12px;
        padding: 10px 14px;
      }

      p {
        color: rgba(0, 0, 0, 0.62);
        font-size: 13px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>Base Culture Score</h1>
    <p>Set the deployed website URL. Local development defaults to http://localhost:3000.</p>
    <label for="apiBaseUrl">Backend URL</label>
    <input id="apiBaseUrl" placeholder="https://your-app.vercel.app" />
    <button id="save" type="button">Save</button>
    <p id="status" role="status"></p>
    <script src="options.js"></script>
  </body>
</html>
